<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolBox by Uzair Elahi — Free Forever</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  :root{
    --bg:#0B0B14; --surface:#14141f; --surface2:#1c1c2b;
    --violet:#7C5CFC; --cyan:#29E7CD; --pink:#FF4FA3;
    --text:#F1F0FF; --muted:#8B88A8;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; overflow-x:hidden;}
  h1,h2,h3,.disp{font-family:'Fredoka',sans-serif;}

  .blob{position:fixed; border-radius:50%; filter:blur(90px); opacity:.45; z-index:0; pointer-events:none; animation:float 14s ease-in-out infinite;}
  .blob1{width:420px;height:420px;background:var(--violet);top:-120px;left:-100px;}
  .blob2{width:380px;height:380px;background:var(--cyan);bottom:-140px;right:-80px;animation-delay:3s;}
  .blob3{width:300px;height:300px;background:var(--pink);top:40%;left:60%;animation-delay:6s;}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(40px,-30px) scale(1.1);}}

  /* ticker */
  .ticker{position:relative; z-index:5; width:100%; overflow:hidden; background:linear-gradient(90deg,var(--pink),var(--violet)); padding:12px 0;}
  .ticker-track{display:flex; width:max-content; animation:scroll 18s linear infinite; white-space:nowrap;}
  .ticker-track span{font-family:'Fredoka',sans-serif; font-weight:600; font-size:15px; letter-spacing:.04em; text-transform:uppercase; color:#fff; padding:0 14px;}
  @keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}

  /* top bar */
  .topbar{position:sticky; top:0; z-index:30; display:flex; justify-content:space-between; align-items:center; padding:14px 18px;}
  .avatar-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--pink));border:2px solid #34344a;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;font-family:'Fredoka',sans-serif;font-size:16px;overflow:hidden;transition:.2s;animation:avatarpulse 2.4s ease-in-out infinite;}
  .avatar-btn:hover{transform:scale(1.1) rotate(-6deg);}
  .avatar-btn img{width:100%;height:100%;object-fit:cover;}
  @keyframes avatarpulse{0%,100%{box-shadow:0 0 0 0 rgba(124,92,252,.5);}50%{box-shadow:0 0 0 8px rgba(124,92,252,0);}}
  .icon-btn{width:36px;height:36px;background:none;border:none;color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;opacity:.85;}
  .icon-btn:hover{opacity:1; color:var(--cyan); transform:scale(1.1);}
  .searchdrop{max-width:1100px;margin:0 auto;padding:0 18px;overflow:hidden;max-height:0;transition:max-height .25s ease;}
  .searchdrop.open{max-height:70px;}
  .searchdrop input{width:100%;padding:10px 14px;border-radius:12px;border:1px solid #2a2a3d;background:var(--surface);color:var(--text);font-size:14px;outline:none;margin:8px auto 4px;max-width:1100px;display:block;}
  .searchdrop input:focus{border-color:var(--cyan);}
  #searchResults{display:none;}

  header{position:relative; z-index:2; text-align:center; padding:40px 20px 30px;}
  .createdby-pill{position:relative; display:inline-block; padding:14px 30px; border-radius:999px; color:var(--muted); font-size:17px; margin-bottom:26px; cursor:pointer; background:#14141f; border:2px solid transparent; transition:transform .2s;}
  .createdby-pill::before{content:""; position:absolute; inset:-2px; z-index:-1; border-radius:999px; background:linear-gradient(120deg,var(--violet),var(--cyan),var(--pink),var(--violet)); background-size:300% 300%; animation:borderflow 4s linear infinite;}
  .createdby-pill:hover{transform:scale(1.05);}
  .createdby-pill b{color:#7CF29C;}
  header h1{font-size:clamp(38px,9vw,68px); font-weight:700; line-height:1.08; margin:0 0 18px;}
  header h1 span{display:block;}
  header h1 .line1{color:#8CF2A4;}
  header h1 .line2{background:linear-gradient(90deg,#8CF2A4 55%,var(--pink) 90%); -webkit-background-clip:text; background-clip:text; color:transparent;}
  header p{color:var(--muted); font-size:17px; max-width:560px; margin:0 auto; line-height:1.5;}
  .navpills{display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:28px;}
  .navpills button{font-family:'Fredoka',sans-serif; font-size:15px; font-weight:600; padding:8px 22px 8px 8px; border-radius:999px; background:#161623; border:1px solid #2a2a3d; color:var(--text); cursor:pointer; transition:.2s; display:flex; align-items:center; gap:10px; animation:pillglow 3s ease-in-out infinite;}
  @keyframes pillglow{0%,100%{box-shadow:0 0 0 rgba(124,92,252,0);}50%{box-shadow:0 0 14px rgba(124,92,252,.35);}}
  .navpills button:hover{border-color:var(--cyan); transform:translateY(-2px);}
  .navpills .badge{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
  .credit{display:none;}

  main{position:relative; z-index:2; max-width:1100px; margin:0 auto; padding:10px 20px 80px;}
  .section{margin-top:46px;}
  .section h2{font-size:22px; display:flex; align-items:center; gap:10px; margin-bottom:16px; font-weight:700;}
  .section h2 .heading-text{background:linear-gradient(90deg,var(--cyan),var(--violet),var(--pink),var(--cyan)); background-size:300% auto; -webkit-background-clip:text; background-clip:text; color:transparent; animation:shine 4s linear infinite;}
  .section h2 .cat-icon{display:inline-block; animation:bouncey 2s ease-in-out infinite;}
  @keyframes bouncey{0%,100%{transform:translateY(0) rotate(0);}50%{transform:translateY(-5px) rotate(-8deg);}}
  .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(90deg,var(--violet),var(--cyan)); animation:dotpulse 1.5s ease-in-out infinite;}
  @keyframes dotpulse{0%,100%{transform:scale(1); opacity:1;}50%{transform:scale(1.5); opacity:.5;}}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px;}
  .card{position:relative; background:var(--surface); border:2px solid transparent; border-radius:16px; padding:18px 14px; cursor:pointer; text-align:center; overflow:hidden; transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
  .card::after{content:""; position:absolute; inset:-2px; z-index:-1; border-radius:18px; background:linear-gradient(120deg,var(--violet),var(--cyan),var(--pink),var(--violet)); background-size:300% 300%; opacity:.5; animation:borderflow 5s linear infinite;}
  .card::before{content:""; position:absolute; inset:0; opacity:0; transition:.3s; background:linear-gradient(135deg,var(--violet),var(--cyan),var(--pink)); z-index:0;}
  @keyframes borderflow{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}
  @keyframes shine{to{background-position:300% center;}}
  .card:hover{transform:translateY(-6px) scale(1.05) rotate(-1deg);}
  .card:hover::before{opacity:.22;}
  .card:hover .ic{animation:wiggle .5s ease;}
  @keyframes wiggle{0%,100%{transform:rotate(0);}25%{transform:rotate(-12deg) scale(1.15);}75%{transform:rotate(12deg) scale(1.15);}}
  .card.active{animation:pop .35s ease;}
  @keyframes pop{50%{transform:scale(.9) rotate(3deg);}}
  .card .ic{font-size:28px; display:block; margin-bottom:8px; position:relative; z-index:1; transition:transform .2s;}
  .card .nm{font-size:13px; font-weight:600; position:relative; z-index:1; line-height:1.3;}
  .card .heart{position:absolute; top:6px; left:6px; z-index:2; font-size:15px; background:none; border:none; cursor:pointer; opacity:.6; transition:transform .15s, opacity .15s;}
  .card .heart:hover{transform:scale(1.3);}
  .card .heart.faved{opacity:1; filter:drop-shadow(0 0 4px var(--pink)); animation:heartbeat .4s ease;}
  @keyframes heartbeat{0%{transform:scale(1);}30%{transform:scale(1.5);}60%{transform:scale(.9);}100%{transform:scale(1);}}
  .card .ext{position:absolute; top:6px; right:6px; font-size:9px; background:var(--surface2); border:1px solid #2c2c42; color:var(--cyan); padding:2px 6px; border-radius:6px; font-weight:700; z-index:1;}
  .card.hidden{display:none;}
  .empty-fav{color:var(--muted); font-size:13px;}

  .overlay{position:fixed; inset:0; background:rgba(5,5,10,.7); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; z-index:100; padding:16px;}
  .overlay.show{display:flex;}
  .modal{background:var(--surface2); border:1px solid #2c2c42; border-radius:20px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; padding:26px; animation:rise .25s ease;}
  @keyframes rise{from{transform:translateY(24px); opacity:0;}to{transform:translateY(0); opacity:1;}}
  .modal h3{margin:0 0 6px; font-size:20px;}
  .modal .desc{color:var(--muted); font-size:13px; margin-bottom:18px;}
  .modal .close{float:right; background:var(--surface); border:1px solid #2c2c42; color:var(--text); width:32px; height:32px; border-radius:10px; cursor:pointer; font-size:16px;}
  .modal label{display:block; font-size:12px; color:var(--muted); margin:14px 0 6px;}
  .modal input[type=text], .modal input[type=number], .modal select, .modal textarea{width:100%; padding:10px 12px; border-radius:10px; border:1px solid #2c2c42; background:var(--bg); color:var(--text); font-size:14px; outline:none;}
  .modal input[type=file]{width:100%; padding:10px; border-radius:10px; border:1px dashed #3a3a55; background:var(--bg); color:var(--muted);}
  .btn{margin-top:16px; width:100%; padding:12px; border:none; border-radius:12px; cursor:pointer; font-weight:700; font-size:14px; color:#fff; background:linear-gradient(90deg,var(--violet),var(--cyan),var(--pink),var(--violet)); background-size:300% auto; transition:transform .15s, box-shadow .2s; display:block; text-align:center; text-decoration:none; animation:btnshine 4s linear infinite;}
  @keyframes btnshine{to{background-position:300% center;}}
  .btn:hover{box-shadow:0 4px 20px rgba(124,92,252,.45); transform:translateY(-2px);}
  .btn:active{transform:scale(.96);}
  .btn.secondary{background:var(--surface); border:1px solid #2c2c42; color:var(--text); margin-top:8px;}
  .result{margin-top:16px; font-size:13px; color:var(--cyan);}
  .previewbox{margin-top:12px; text-align:center;}
  .previewbox img, .previewbox canvas{max-width:100%; border-radius:10px; border:1px solid #2c2c42;}
  .row2{display:flex; gap:10px;}
  .row2>*{flex:1;}
  .meterbar{height:10px; background:#0b0b14; border-radius:6px; overflow:hidden; margin-top:10px;}
  .meterbar div{height:100%; width:0%; background:linear-gradient(90deg,var(--cyan),var(--pink)); transition:width .1s;}
  .modetabs{display:flex; gap:8px; margin-top:10px;}
  .modetabs button{flex:1; padding:8px; border-radius:10px; border:1px solid #2c2c42; background:var(--bg); color:var(--muted); cursor:pointer; font-size:13px;}
  .modetabs button.on{background:linear-gradient(90deg,var(--violet),var(--pink)); color:#fff; border-color:transparent;}

  footer{text-align:center; padding:30px; font-size:15px; position:relative; z-index:2;}
  .footer-anim{font-family:'Fredoka',sans-serif; font-weight:600; font-size:16px; background:linear-gradient(90deg,var(--cyan),var(--violet),var(--pink),var(--cyan)); background-size:300% auto; -webkit-background-clip:text; background-clip:text; color:transparent; animation:shine 5s linear infinite;}
  .fh{display:inline-block; animation:heartbeat 1.2s ease-in-out infinite;}
</style>
</head>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="ticker">

    <span>✨ FREE FOREVER</span><span>·</span><span>NO SIGNUP</span><span>·</span><span>100% IN-BROWSER</span><span>·</span>
    <span>✨ FREE FOREVER</span><span>·</span><span>NO SIGNUP</span><span>·</span><span>100% IN-BROWSER</span><span>·</span>
  </div>
</div>

<div class="topbar">
  <button class="avatar-btn" onclick="funReload()" aria-label="Refresh">U</button>

    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

</div>

</header>

  <div class="modal" id="modal">
    <button class="close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
/* ---------- click sound ---------- */
let actx;
function pop(freq=520){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type='sine'; o.frequency.setValueAtTime(freq, actx.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq*1.6, actx.currentTime+0.08);
    g.gain.setValueAtTime(0.18, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.15);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+0.16);
  }catch(e){}
}

/* ---------- avatar refresh (funny sound) ---------- */
function funReload(){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type='square'; o.frequency.setValueAtTime(600, actx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, actx.currentTime+0.35);
    g.gain.setValueAtTime(0.2, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.4);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+0.4);
  }catch(e){}
  setTimeout(()=>location.reload(), 250);
}

/* ---------- search dropdown ---------- */
function toggleSearch(){
  pop(700);
  const d = document.getElementById('searchdrop');
  d.classList.toggle('open');
  if(d.classList.contains('open')) setTimeout(()=>document.getElementById('search').focus(), 150);
  else { document.getElementById('search').value=''; runSearch(''); }
}

/* ---------- favorites (saved in this browser) ---------- */
function getFavs(){ try{ return JSON.parse(localStorage.getItem('toolbox_favs')||'[]'); }catch(e){ return []; } }
function setFavs(arr){ try{ localStorage.setItem('toolbox_favs', JSON.stringify(arr)); }catch(e){} }
function favChime(){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    [660, 990].forEach((f,i)=>{
      const o = actx.createOscillator(), g = actx.createGain();
      o.type='triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0.001, actx.currentTime + i*0.09);
      g.gain.linearRampToValueAtTime(0.2, actx.currentTime + i*0.09 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + i*0.09 + 0.18);
      o.connect(g); g.connect(actx.destination);
      o.start(actx.currentTime + i*0.09); o.stop(actx.currentTime + i*0.09 + 0.2);
    });
  }catch(e){}
}
function toggleFav(id, e){
  e.stopPropagation(); favChime();
  let favs = getFavs();
  favs = favs.includes(id) ? favs.filter(x=>x!==id) : [...favs, id];
  setFavs(favs);
  renderAll();
}

/* ---------- tool data ----------
   type "app"  -> opens the built-in tool modal (runs fully in this page)
   type "link" -> opens a free external site for that job (can't run client-side / against platform ToS to build ourselves)
*/
const categories = [
  { name:"Favourites", icon:"⭐", key:"favs", tools:[] }, // populated dynamically
  { name:"Photo & PDF tools", icon:"🖼️", tools:[
    {id:"photo2pdf", name:"Photo to PDF", icon:"📄", type:"app"},
    {id:"imgcompress", name:"Image Compressor", icon:"🗜️", type:"app"},
    {id:"pdfmerge", name:"PDF Merge", icon:"📚", type:"app"},
    {id:"handwriting", name:"Text to Handwriting", icon:"✍️", type:"app"},
    {id:"bgremove", name:"Background Remover", icon:"✂️", type:"link", url:"https://www.remove.bg/upload"},
    {id:"word2pdf", name:"Word to PDF", icon:"📝", type:"link", url:"https://smallpdf.com/word-to-pdf"},
    {id:"resize", name:"Resize Image", icon:"📐", type:"app"},
    {id:"passport", name:"Passport Size Photo", icon:"🪪", type:"app"},
    {id:"aiimage", name:"AI Image Generator", icon:"🤖", type:"link", url:"https://www.bing.com/images/create"},
    {id:"vidresize", name:"Video Resize", icon:"🎬", type:"link", url:"https://www.clideo.com/resize-video"},
  ]},
  { name:"Movies", icon:"🎬", tools:[
    {id:"bollywood", name:"Bollywood", icon:"🎥", type:"link", url:"https://rogmovies.rest/"},
    {id:"hollywood", name:"Hollywood", icon:"🍿", type:"link", url:"https://rogmovies.rest/"},
  ]},
  { name:"Social media tools", icon:"📱", tools:[
    {id:"ytaudio", name:"YouTube Audio Downloader", icon:"🎧", type:"link", url:"https://y2mate.com"},
    {id:"ytvideo", name:"YouTube Video Downloader", icon:"📹", type:"link", url:"https://y2mate.com"},
    {id:"igdown", name:"Insta Reel/Post Downloader", icon:"📥", type:"link", url:"https://indown.io"},
    {id:"igpfp", name:"Insta Profile Picture Downloader", icon:"🖼️", type:"link", url:"https://instadp.com"},
    {id:"ytthumb", name:"YouTube Thumbnail Downloader", icon:"🖼️", type:"app"},
    {id:"tempmail", name:"Temp Mail", icon:"📮", type:"link", url:"https://temp-mail.org", extra:"✅ Free unlimited mail — create as many inboxes as you need"},
  ]},
  { name:"Phone tools", icon:"🔧", tools:[
    {id:"speakerclean", name:"Speaker Cleaner", icon:"🔊", type:"app"},
    {id:"mictest", name:"Mic Test", icon:"🎙️", type:"app"},
    {id:"earbudtest", name:"Earbuds Stereo Test", icon:"🎧", type:"app"},
    {id:"speedtest", name:"Internet Speed Test", icon:"📶", type:"app"},
    {id:"compass", name:"Compass & Qibla", icon:"🧭", type:"app"},
  ]},
  { name:"Calculators", icon:"🧮", tools:[
    {id:"agecalc", name:"Age Calculator", icon:"🎂", type:"app"},
    {id:"gstcalc", name:"GST Calculator", icon:"💰", type:"app"},
    {id:"pctcalc", name:"Percentage Calculator", icon:"%", type:"app"},
    {id:"cgpacalc", name:"CGPA Calculator", icon:"🎓", type:"app"},
  ]},
];
const allTools = categories.flatMap(c=>c.tools);

/* ---------- render ---------- */
function makeCard(t){
  const favs = getFavs();
  const c = document.createElement('div');
  c.className='card';
  c.dataset.name = t.name.toLowerCase();
  const isFav = favs.includes(t.id);
  c.innerHTML = `
    <button class="heart ${isFav?'faved':''}" onclick="toggleFav('${t.id}', event)">${isFav?'❤️':'🤍'}</button>
    ${t.type==='link'?'<span class="ext">OPENS SITE</span>':''}
    <span class="ic">${t.icon}</span><span class="nm">${t.name}</span>`;
  c.onclick = ()=>{ pop(); c.classList.remove('active'); void c.offsetWidth; c.classList.add('active'); openTool(t); };
  return c;
}
function renderAll(){
  const main = document.getElementById('main');
  main.innerHTML = '';
  const favs = getFavs();
  categories.forEach(cat=>{
    let tools = cat.key==='favs' ? allTools.filter(t=>favs.includes(t.id)) : cat.tools;
    if(cat.key==='favs' && tools.length===0) return; // hide empty favourites section
    const sec = document.createElement('div');
    sec.className='section';
    sec.id = 'cat-' + (cat.key || cat.name.toLowerCase().replace(/[^a-z]+/g,'-'));
    sec.innerHTML = `<h2><span class="dot"></span><span class="cat-icon">${cat.icon}</span><span class="heading-text">${cat.name}</span></h2>`;
    const grid = document.createElement('div');
    grid.className='grid';
    tools.forEach(t=>grid.appendChild(makeCard(t)));
    sec.appendChild(grid);
    main.appendChild(sec);
  });
}
renderAll();
buildNavPills();
function buildNavPills(){
  const wrap = document.getElementById('navpills');
  wrap.innerHTML = '';
  const pills = [
    { icon:'🖼️', label:'Photo', target:'Photo & PDF tools', bg:'#3a2a10' },
    { icon:'📱', label:'Social', target:'Social media tools', bg:'#141d2b' },
    { icon:'🧮', label:'Calculator', target:'Calculators', bg:'#3a1414' },
    { icon:'⚡', label:'Utility', target:'Phone tools', bg:'#2a2410' },
    { icon:'🎬', label:'Movies', target:'Movies', bg:'#1f1f33' },
  ];
  pills.forEach(p=>{
    const id = 'cat-' + p.target.toLowerCase().replace(/[^a-z]+/g,'-');
    const b = document.createElement('button');
    b.innerHTML = `<span class="badge" style="background:${p.bg}">${p.icon}</span>${p.label}`;
    b.onclick = ()=>{ pop(600); document.getElementById(id)?.scrollIntoView({behavior:'smooth', block:'start'}); };
    wrap.appendChild(b);
  });
}

/* ---------- search: focused results mode ---------- */

const initializers = {};

/* ----- Photo to PDF ----- */
function doPhoto2Pdf(){
  const files = document.getElementById('p2p_files').files;
  if(!files.length) return document.getElementById('p2p_result').innerText = 'Pick at least one image.';
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let loaded = 0;
  const imgs = [...files];
  const readNext = (i)=>{
    if(i>0) doc.addPage();
    const reader = new FileReader();
    reader.onload = ev=>{
      const img = new Image();
      img.onload = ()=>{
        const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();
        const ratio = Math.min(pw/img.width, ph/img.height);
        const w = img.width*ratio, h = img.height*ratio;
        doc.addImage(img, 'JPEG', (pw-w)/2, (ph-h)/2, w, h);
        loaded++;
        if(loaded < imgs.length) readNext(loaded);
        else { doc.save('photos.pdf'); document.getElementById('p2p_result').innerText = 'Done — PDF downloaded ✅'; }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(imgs[i]);
  };
  readNext(0);
}

/* ----- Image Compressor ----- */
function doCompress(){
  const file = document.getElementById('ic_file').files[0];
  if(!file) return;
  const q = document.getElementById('ic_q').value/100;
  const img = new Image();
  const reader = new FileReader();
  reader.onload = e=>{
    img.onload = ()=>{
      const canvas = document.createElement('canvas');
      canvas.width = img.width; canvas.height = img.height;
      canvas.getContext('2d').drawImage(img,0,0);
      canvas.toBlob(blob=>{
        const url = URL.createObjectURL(blob);
        document.getElementById('ic_preview').innerHTML = `<img src="${url}">`;
        document.getElementById('ic_result').innerHTML = `Original: ${(file.size/1024).toFixed(1)}KB → Compressed: ${(blob.size/1024).toFixed(1)}KB <br><a class="btn" href="${url}" download="compressed.jpg">Download</a>`;
      }, 'image/jpeg', q);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ----- PDF Merge ----- */
async function doPdfMerge(){
  const files = document.getElementById('pm_files').files;
  if(files.length < 2) return document.getElementById('pm_result').innerText = 'Pick at least 2 PDFs.';
  const { PDFDocument } = PDFLib;
  const merged = await PDFDocument.create();
  for(const f of files){
    const bytes = await f.arrayBuffer();
    const src = await PDFDocument.load(bytes);
    const pages = await merged.copyPages(src, src.getPageIndices());
    pages.forEach(p=>merged.addPage(p));
  }
  const bytes = await merged.save();
  const blob = new Blob([bytes], {type:'application/pdf'});
  const url = URL.createObjectURL(blob);
  document.getElementById('pm_result').innerHTML = `Merged ✅ <a class="btn" href="${url}" download="merged.pdf">Download merged.pdf</a>`;
}

/* ----- Text to Handwriting ----- */
function doHandwriting(){
  const text = document.getElementById('hw_text').value;
  const style = document.getElementById('hw_page').value;
  const color = document.getElementById('hw_color_picker').value;
  const canvas = document.createElement('canvas');
  canvas.width = 800; canvas.height = 1000;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fdfcf5'; ctx.fillRect(0,0,canvas.width,canvas.height);
  const lineH = 42, startY = 80, marginX = 60;
  if(style==='ruled'){
    ctx.strokeStyle = '#c9d6ff'; ctx.lineWidth = 1;
    for(let y=startY-20; y<canvas.height-30; y+=lineH){
      ctx.beginPath(); ctx.moveTo(30,y); ctx.lineTo(canvas.width-30,y); ctx.stroke();
    }
    ctx.strokeStyle = '#f3a3a3';
    ctx.beginPath(); ctx.moveTo(marginX-20,20); ctx.lineTo(marginX-20,canvas.height-20); ctx.stroke();
  }
  ctx.fillStyle = color;
  ctx.font = "32px 'Caveat', cursive";
  const words = text.split(/\s+/);
  let line = '', y = startY, x = marginX;
  const maxW = canvas.width - marginX - 40;
  words.forEach(w=>{
    const test = line + w + ' ';
    if(ctx.measureText(test).width > maxW){
      ctx.fillText(line, x, y); line = w + ' '; y += lineH;
    } else line = test;
  });
  ctx.fillText(line, x, y);
  document.getElementById('hw_preview').innerHTML = '';
  document.getElementById('hw_preview').appendChild(canvas);
  const dl = document.createElement('a');
  dl.className='btn'; dl.innerText='Download image';
  dl.href = canvas.toDataURL('image/png'); dl.download='handwriting.png';
  document.getElementById('hw_preview').appendChild(dl);
}

function doPassport(){

/* ----- Speaker Cleaner ----- */
function playSweep(){
  actx = actx || new (window.AudioContext||window.webkitAudioContext)();
  const o = actx.createOscillator(), g = actx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(150, actx.currentTime);
  o.frequency.linearRampToValueAtTime(18000, actx.currentTime+7);
  o.frequency.linearRampToValueAtTime(150, actx.currentTime+14);
  g.gain.setValueAtTime(0.5, actx.currentTime);
  o.connect(g); g.connect(actx.destination);
  o.start(); o.stop(actx.currentTime+15);
  document.getElementById('sc_result').innerText = 'Playing... keep speaker facing down.';
  setTimeout(()=>document.getElementById('sc_result').innerText='Done ✅', 15000);
}

/* ----- Mic Test ----- */
function startMicTest(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    const src = ac.createMediaStreamSource(stream);
    const analyser = ac.createAnalyser(); analyser.fftSize=256;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    document.getElementById('mic_result').innerText = 'Listening… speak now 🎙️';
    function tick(){
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a,b)=>a+b,0)/data.length;
      document.getElementById('mic_bar').style.width = Math.min(100, avg*1.5)+'%';
      requestAnimationFrame(tick);
    }
    tick();
  }).catch(()=>{ document.getElementById('mic_result').innerText = 'Mic access denied or unavailable.'; });
}

/* ----- Earbuds Stereo Test ----- */
function playChannel(side){
  actx = actx || new (window.AudioContext||window.webkitAudioContext)();
  const o = actx.createOscillator(), g = actx.createGain(), p = actx.createStereoPanner();
  p.pan.value = side==='left' ? -1 : 1;
  o.frequency.value = 440;
  g.gain.value = 0.3;
  o.connect(g); g.connect(p); p.connect(actx.destination);
  o.start(); o.stop(actx.currentTime+1.2);
}

/* ----- Internet Speed Test ----- */
function runSpeedTest(){
  document.getElementById('st_result').innerText = 'Testing…';
  const url = 'https://upload.wikimedia.org/wikipedia/commons/3/3a/Cat03.jpg?cachebust=' + Date.now();
  const start = performance.now();
  fetch(url).then(r=>r.blob()).then(blob=>{
    const dur = (performance.now()-start)/1000;
    const mbits = (blob.size*8/1e6)/dur;
    document.getElementById('st_result').innerText = `≈ ${mbits.toFixed(2)} Mbps (rough estimate, single small file)`;
  }).catch(()=>{ document.getElementById('st_result').innerText = 'Could not run test — check connection.'; });
}

/* ----- Compass & Qibla ----- */
let compassMode = 'compass';
let qiblaBearing = null;
function setCompassMode(mode){
  pop(650);
  compassMode = mode;
  document.getElementById('mode_compass').classList.toggle('on', mode==='compass');
  document.getElementById('mode_qibla').classList.toggle('on', mode==='qibla');
  document.getElementById('qibla_tag').style.display = mode==='qibla' ? 'block' : 'none';
  document.getElementById('compass_needle').innerText = mode==='qibla' ? '⬆️' : '🧭';
  document.getElementById('compass_result').innerText = '';
  if(mode==='qibla' && qiblaBearing===null) locateForQibla();
}
function locateForQibla(){
  if(!navigator.geolocation) return document.getElementById('compass_result').innerText = 'Location not supported.';
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat1 = pos.coords.latitude * Math.PI/180, lon1 = pos.coords.longitude * Math.PI/180;
    const lat2 = 21.4225 * Math.PI/180, lon2 = 39.8262 * Math.PI/180; // Kaaba, Mecca
    const dLon = lon2 - lon1;
    const y = Math.sin(dLon) * Math.cos(lat2);
    const x = Math.cos(lat1)*Math.sin(lat2) - Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
    let brng = Math.atan2(y, x) * 180/Math.PI;
    qiblaBearing = (brng + 360) % 360;
    document.getElementById('compass_result').innerText = `Qibla bearing: ${Math.round(qiblaBearing)}° from North`;
  }, ()=>{ document.getElementById('compass_result').innerText = 'Location permission denied.'; });
}
function startCompass(){
  if(compassMode==='qibla' && qiblaBearing===null) locateForQibla();
  function handler(e){
    const heading = e.webkitCompassHeading!==undefined ? e.webkitCompassHeading : (360 - (e.alpha||0));
    let show = heading, label = Math.round(heading)+'° (facing North reference)';
    if(compassMode==='qibla' && qiblaBearing!==null){
      show = qiblaBearing - heading;
      label = `Rotate until arrow points up — that's Qibla (${Math.round(qiblaBearing)}° from North)`;
    }
    document.getElementById('compass_needle').style.transform = `rotate(${show}deg)`;
    document.getElementById('compass_needle').innerText = compassMode==='qibla' ? '🕋⬆️' : '🧭';
    document.getElementById('compass_result').innerText = label;
  }
  if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission().then(res=>{
      if(res==='granted') window.addEventListener('deviceorientation', handler);
      else document.getElementById('compass_result').innerText = 'Permission denied.';
    });
  } else if('DeviceOrientationEvent' in window){
    window.addEventListener('deviceorientationabsolute', handler, true);
    window.addEventListener('deviceorientation', handler, true);
  } else {
    document.getElementById('compass_result').innerText = 'Not supported on this device/browser.';
  }
}

/* ----- Calculators ----- */
function doAge(){
  const dob = new Date(document.getElementById('ac_dob').value);
  if(isNaN(dob)) return document.getElementById('ac_result').innerText = 'Enter a valid date (YYYY-MM-DD).';
  const now = new Date();
  let y = now.getFullYear()-dob.getFullYear(), m = now.getMonth()-dob.getMonth(), d = now.getDate()-dob.getDate();
  if(d<0){ m--; d += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
  if(m<0){ y--; m+=12; }
  document.getElementById('ac_result').innerText = `${y} years, ${m} months, ${d} days`;
}
function doGst(){
  const amt = +document.getElementById('gc_amt').value, rate = +document.getElementById('gc_rate').value;
  const mode = document.getElementById('gc_mode').value;
  let base, gst, total;
  if(mode==='add'){ gst = amt*rate/100; total = amt+gst; base=amt; }
  else { base = amt/(1+rate/100); gst = amt-base; total = amt; }
  document.getElementById('gc_result').innerText = `Base: ₹${base.toFixed(2)} · GST: ₹${gst.toFixed(2)} · Total: ₹${total.toFixed(2)}`;
}
function doPct(){
  const a = +document.getElementById('pc_a').value, b = +document.getElementById('pc_b').value;
  document.getElementById('pc_result').innerText = `${a}% of ${b} = ${(a/100*b).toFixed(2)}`;
}
function doCgpa(){
  const pts = document.getElementById('cg_points').value.split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
  const crd = document.getElementById('cg_credits').value.split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
  if(!pts.length || pts.length !== crd.length) return document.getElementById('cg_result').innerText = 'Enter the same number of grade points and credits, comma separated.';
  let sumPC = 0, sumC = 0;
  for(let i=0;i<pts.length;i++){ sumPC += pts[i]*crd[i]; sumC += crd[i]; }
  const cgpa = sumPC/sumC;
  document.getElementById('cg_result').innerText = `CGPA: ${cgpa.toFixed(2)}  (Σ grade×credit = ${sumPC.toFixed(1)}, Σ credit = ${sumC})`;
}
</script>
</body>
</html>
